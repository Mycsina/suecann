# A/B test substrate: asymmetric (positive-only) sweep + IDENTITY outputs.
# Counter-config to stageb.toml (which uses THRESHOLD outputs + symmetric sweep).
# Probe C: IDENTITY + asymmetric sweep yields CONTINUOUS positive knobs (+0.667
# from a +1 bias). Phase-0 card-match 0.624 (vs sym+THRESHOLD 0.643). This run
# measures Phase-1 game strength to pick the winning substrate.
# Identical to stageb.toml except: output_activation, sweep_weights.

[population]
pop_size = 1000
generations = 600
elitism = 20
pareto_complexity_prob = 0.50
output_activation = "identity"

[evaluation]
n_deals = 128
sweep_weights = [0.5, 1.0, 2.0]
seed = 1337

[species]
compatibility_threshold = 1.4
stagnation_limit = 40
c_excess = 1.0
c_disjoint = 1.0
c_mismatch = 0.5
min_species_size = 3
max_species = 20

[mutation]
p_add_node = 0.15
p_add_conn = 0.35
p_toggle_conn = 0.05
p_flip_sign = 0.10
p_change_act = 0.10
p_change_agg = 0.10
p_crossover = 0.50
allow_output_act_mutation = true

[curriculum]
phase0_gens = 150
bulking_gens = 50
phase0_dataset = "expert_states_v7.npz"
min_gens_per_phase = 20
adaptive_window = 10
pfs_sample_size = 100
class_balance_target = 30000
soft_balance_min_ratio = 0.0
use_class_weighting = false

[hall_of_fame]
hof_size = 50

[output]
checkpoint_dir = "checkpoints/asym_identity"
stats_file = "training_stats.csv"
