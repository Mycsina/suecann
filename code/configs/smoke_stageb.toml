# Smoke test config — validates the Stage-B card-match pipeline end to end
# (Phase 0 supervised → Phase 1 self-play transition).
[population]
pop_size = 20
generations = 3
elitism = 2
pareto_complexity_prob = 0.5

[evaluation]
n_deals = 4
sweep_weights = [1.0]
seed = 1337

[species]
compatibility_threshold = 1.4
stagnation_limit = 40
c_excess = 1.0
c_disjoint = 1.0
c_mismatch = 0.5
min_species_size = 3
max_species = 20

[mutation]
p_add_node = 0.15
p_add_conn = 0.35
p_toggle_conn = 0.05
p_flip_sign = 0.10
p_change_act = 0.10
p_change_agg = 0.10
p_crossover = 0.50

[curriculum]
phase0_gens = 2
bulking_gens = 1
min_gens_per_phase = 1
adaptive_window = 5
phase0_dataset = "/tmp/stageb_smoke.npz"
pfs_sample_size = 20
class_balance_target = 30000
soft_balance_min_ratio = 0.0
use_class_weighting = false

[hall_of_fame]
hof_size = 5

[output]
checkpoint_dir = "checkpoints/smoke_stageb"
stats_file = "training_stats.csv"
