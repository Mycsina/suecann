server {
    listen 80;
    root /usr/share/nginx/html;
    server_tokens off;

    # Include default MIME types, then add WASM (browsers reject WASM without it)
    include /etc/nginx/mime.types;
    types {
        application/wasm wasm;
    }

    # HTML — never cached (picks up new builds immediately)
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Hashed assets — immutable, cached 1 year
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WASM: 216 KB → 92 KB gzipped
    # JS:   225 KB → 70 KB gzipped
    gzip on;
    gzip_vary on;
    gzip_types application/wasm application/javascript text/css image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;
}
