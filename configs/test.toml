# configs/test.toml
# Test configuration for quick verification of the Rust training pipeline

[population]
pop_size = 10
generations = 18
elitism = 2
seed_fraction = 0.15
pareto_complexity_prob = 0.80

[evaluation]
n_deals = 2
curriculum_gens = 5
sweep_weights = [-1.0, 1.0]
seed = 42

[species]
compatibility_threshold = 1.2
stagnation_limit = 25
c_excess = 1.0
c_disjoint = 1.0
c_mismatch = 0.4

[mutation]
p_add_node = 0.20
p_add_conn = 0.30
p_toggle_conn = 0.10
p_flip_sign = 0.15
p_change_act = 0.20
p_change_agg = 0.15
p_crossover = 0.30

[curriculum]
phase0_gens = 10
bulking_gens = 2
phase0_threshold = -0.10
phase1_threshold = -0.05
phase2_hof_min = 3
min_gens_per_phase = 2
adaptive_window = 2

[hall_of_fame]
hof_size = 5

[output]
checkpoint_dir = "test_checkpoints"
stats_file = "test_training_stats.csv"
