# configs/test.toml

[population]
pop_size = 100
generations = 30
elitism = 3
seed_fraction = 0.15
pareto_complexity_prob = 0.80

[evaluation]
n_deals = 16
curriculum_gens = 10
sweep_weights = [-2.0, -1.0, -0.5, 0.5, 1.0, 2.0]
seed = 42

[species]
compatibility_threshold = 1.2
stagnation_limit = 25
c_excess = 1.0
c_disjoint = 1.0
c_mismatch = 0.4

[mutation]
p_add_node = 0.20
p_add_conn = 0.35
p_toggle_conn = 0.05
p_flip_sign = 0.10
p_change_act = 0.25
p_change_agg = 0.15
p_crossover = 0.40

[curriculum]
phase0_gens = 20
bulking_gens = 5
phase0_threshold = -0.10
phase1_threshold = -0.05
phase0_dataset = "expert_states_w80_d4.npz"
phase2_hof_min = 3
min_gens_per_phase = 2
adaptive_window = 2

[hall_of_fame]
hof_size = 5

[output]
checkpoint_dir = "checkpoints/test"
stats_file = "test_training_stats.csv"
