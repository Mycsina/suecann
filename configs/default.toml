# configs/default.toml
# Centralized hyperparameters for Sueca WANN training

[population]
pop_size = 400
generations = 1000
elitism = 8
seed_fraction = 0.15
pareto_complexity_prob = 0.80

[evaluation]
n_deals = 48
curriculum_gens = 200
sweep_weights = [-2.0, -1.0, -0.5, 0.5, 1.0, 2.0]
seed = 42

[species]
compatibility_threshold = 1.2
stagnation_limit = 25
c_excess = 1.0
c_disjoint = 1.0
c_mismatch = 0.4

[mutation]
p_add_node = 0.20
p_add_conn = 0.30
p_toggle_conn = 0.10
p_flip_sign = 0.15
p_change_act = 0.20
p_change_agg = 0.15
p_crossover = 0.30

[curriculum]
phase0_gens = 100
bulking_gens = 50
phase0_threshold = -0.10
phase1_threshold = -0.05
phase2_hof_min = 3
min_gens_per_phase = 20
adaptive_window = 10

[hall_of_fame]
hof_size = 30

[output]
checkpoint_dir = "checkpoints"
stats_file = "training_stats.csv"
