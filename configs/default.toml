# Full-scale production config — 3-4 hour runtime

[population]
pop_size = 1000
generations = 1200
elitism = 3
pareto_complexity_prob = 0.80

[evaluation]
n_deals = 128
curriculum_gens = 300
sweep_weights = [1.0]
seed = 1337

[species]
compatibility_threshold = 1.4
stagnation_limit = 40
c_excess = 1.0
c_disjoint = 1.0
c_mismatch = 0.5

[mutation]
p_add_node = 0.20
p_add_conn = 0.35
p_toggle_conn = 0.05
p_flip_sign = 0.10
p_change_act = 0.25
p_change_agg = 0.15
p_crossover = 0.40

[curriculum]
phase0_gens = 200
bulking_gens = 100
phase0_dataset = "expert_states_w20_d2.npz"

[hall_of_fame]
hof_size = 50

[output]
checkpoint_dir = "checkpoints/production"
stats_file = "production_training_stats.csv"
