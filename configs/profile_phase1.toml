# Profiling config — Phase 1 only: co-evolutionary self-play
# Resume from Phase 0 checkpoint

[population]
pop_size = 400
generations = 50
elitism = 3
pareto_complexity_prob = 0.80

[evaluation]
n_deals = 48
curriculum_gens = 300
sweep_weights = [1.0]
seed = 1337

[species]
compatibility_threshold = 1.4
stagnation_limit = 40
c_excess = 1.0
c_disjoint = 1.0
c_mismatch = 0.5
min_species_size = 3

[mutation]
p_add_node = 0.20
p_add_conn = 0.35
p_toggle_conn = 0.05
p_flip_sign = 0.10
p_change_act = 0.25
p_change_agg = 0.15
p_crossover = 0.40

[curriculum]
phase0_gens = 0
bulking_gens = 100
phase0_dataset = "db_w40_d3_n1e5.npz"
phase0_threshold = -0.10
phase1_threshold = -0.05
phase2_hof_min = 3
min_gens_per_phase = 20
adaptive_window = 10

[hall_of_fame]
hof_size = 30

[output]
checkpoint_dir = "checkpoints/profile_phase1"
stats_file = "training_stats.csv"
